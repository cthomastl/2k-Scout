name: CI/CD

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  lint-build:
    name: Lint & build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  build-and-push:
    name: Build & push images
    needs: lint-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [frontend, gateway, team-service, ai-service, auth-service]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/2k-scout-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service == 'frontend' && '.' || format('services/{0}', matrix.service) }}
          file: ${{ matrix.service == 'frontend' && 'Dockerfile.frontend' || format('services/{0}/Dockerfile', matrix.service) }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/2k-scout-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/2k-scout-${{ matrix.service }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
