apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: 2k-scout-ingress
  namespace: 2k-scout
spec:
  ingressClassName: traefik
  rules:
    - host: 2kscout.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
