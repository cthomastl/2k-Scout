apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: splunk-data
  namespace: logging
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: splunk
  namespace: logging
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: splunk
  template:
    metadata:
      labels:
        app: splunk
    spec:
      # Deliberately no pod-level securityContext / runAsUser override here.
      # The splunk/splunk image's own entrypoint is designed to start as
      # root and drop privileges to its built-in "splunk" user (UID 41812)
      # itself internally, fixing ownership on the mounted PVC as part of
      # that process. Forcing runAsUser: 41812 at the Kubernetes level skips
      # that internal root-then-drop logic and starts the embedded
      # first-boot Ansible playbook already unprivileged, which then fails
      # partway through trying to `sudo chown` its own directories with no
      # password configured. Let it run as root as the image intends.
      containers:
        - name: splunk
          image: splunk/splunk:latest
          # Splunk's embedded first-boot Ansible playbook calls `sudo` on
          # every task, and its PAM account-management step needs more than
          # just AUDIT_WRITE to succeed under containerd's default (much
          # more restrictive than plain `docker run`'s) capability set —
          # granting that one capability alone still failed PAM with
          # "Authentication service cannot retrieve authentication info".
          # This is a single-instance local dev pod, not production, so
          # privileged: true (every capability at once) is the pragmatic
          # fix rather than chasing each missing capability individually.
          securityContext:
            privileged: true
          ports:
            - name: web
              containerPort: 8000
            - name: hec
              containerPort: 8088
            - name: mgmt
              containerPort: 8089
          env:
            - name: SPLUNK_START_ARGS
              value: "--accept-license"
            # Newer splunk/splunk images added a second, separate gate on top of
            # --accept-license: without this var the container refuses to start
            # at all ("License not accepted, please adjust SPLUNK_GENERAL_TERMS").
            - name: SPLUNK_GENERAL_TERMS
              value: "--accept-sgt-current-at-splunk-com"
            - name: SPLUNK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: splunk-secrets
                  key: SPLUNK_PASSWORD
            # Setting this env var makes the container auto-provision a HEC
            # input using this exact token on first boot — no manual setup
            # in the web UI needed before Fluent Bit can start sending data.
            - name: SPLUNK_HEC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: splunk-secrets
                  key: SPLUNK_HEC_TOKEN
          volumeMounts:
            - name: data
              mountPath: /opt/splunk/var
          # Splunk is genuinely heavier than everything else in this repo —
          # first boot alone can take a couple of minutes. These are workable
          # single-instance dev numbers, not production sizing.
          resources:
            requests:
              cpu: 500m
              memory: 1.5Gi
            limits:
              cpu: 2
              memory: 4Gi
          # Liveness/readiness stay disabled until this succeeds once, so a
          # slow first boot (Ansible + splunkd + KV store + web server init)
          # can't get killed mid-startup. 40 x 15s = 10 minutes of budget
          # before Kubernetes gives up and restarts the container.
          startupProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 15
            # 120 x 15s = 30 min. Bumped from the original 40 (10 min) — on a
            # laptop sharing CPU with everything else in this repo, first boot
            # was still going (not stuck, just slow) when the shorter budget
            # gave up and killed it mid-setup, forcing a restart from scratch.
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /en-US/account/login
              port: 8000
              scheme: HTTPS
            periodSeconds: 15
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: splunk-data
---
apiVersion: v1
kind: Service
metadata:
  name: splunk
  namespace: logging
  labels:
    app: splunk
spec:
  type: ClusterIP
  selector:
    app: splunk
  ports:
    - name: web
      port: 8000
      targetPort: 8000
    - name: hec
      port: 8088
      targetPort: 8088
    - name: mgmt
      port: 8089
      targetPort: 8089
