# TEMPLATE ONLY — do not commit real secrets.
# Copy to k8s/logging/secrets.yaml, fill in real values, apply out-of-band
# (kubectl apply -f k8s/logging/secrets.yaml). Never check the real file in.
apiVersion: v1
kind: Secret
metadata:
  name: splunk-secrets
  namespace: logging
type: Opaque
stringData:
  # Splunk's admin password — must be at least 8 characters or the
  # container fails its first-boot setup.
  SPLUNK_PASSWORD: "replace-me-8-chars-min"
  # Any string works as a HEC token (it's not validated against anything
  # external) — a random UUID is the convention. This same value is used
  # both to auto-provision the HEC input on Splunk's side and to
  # authenticate Fluent Bit's requests to it.
  SPLUNK_HEC_TOKEN: "11111111-1111-1111-1111-111111111111"
