apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Parsers_File  parsers.conf

    # Scoped to the 2k-scout namespace's containers only — shipping every
    # kube-system log would be noisy and hides the signal you actually
    # want. Real teams scope ingestion deliberately.
    [INPUT]
        Name              tail
        Path              /var/log/containers/*_2k-scout_*.log
        Parser            cri
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [OUTPUT]
        Name                    loki
        Match                   kube.*
        Host                    loki.logging.svc.cluster.local
        Port                    3100
        Labels                  job=fluent-bit
        Auto_Kubernetes_Labels  On
