apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Parsers_File  parsers.conf

    # Scoped to the 2k-scout namespace's containers only — shipping every
    # kube-system log to Splunk would be noisy and, in a real paid Splunk
    # deployment, expensive. Real teams scope ingestion deliberately.
    [INPUT]
        Name              tail
        Path              /var/log/containers/*_2k-scout_*.log
        Parser            cri
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [OUTPUT]
        Name             splunk
        Match            kube.*
        Host             splunk.logging.svc.cluster.local
        Port             8088
        Splunk_Token     ${SPLUNK_HEC_TOKEN}
        TLS              On
        TLS.Verify       Off
        Splunk_Send_Raw  Off
