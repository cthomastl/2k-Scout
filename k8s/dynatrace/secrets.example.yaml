# TEMPLATE ONLY — do not commit real secrets.
# Copy to k8s/dynatrace/secrets.yaml, fill in real values, apply out-of-band
# (kubectl apply -f k8s/dynatrace/secrets.yaml). Never check the real file in.
#
# Both tokens come from your Dynatrace environment: Settings > Access tokens.
# apiToken needs "Access problem and event feed, metrics, and topology" plus
# "Download installer" scopes; dataIngestToken needs "Ingest metrics".
apiVersion: v1
kind: Secret
metadata:
  name: dynakube
  namespace: dynatrace
type: Opaque
stringData:
  apiToken: "replace-me"
  dataIngestToken: "replace-me"
