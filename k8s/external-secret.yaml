---
# Requires External Secrets Operator: https://external-secrets.io
# Install: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# The EKS node role (or an IRSA service account) must have this IAM policy:
#   secretsmanager:GetSecretValue on arn:aws:secretsmanager:REGION:ACCOUNT_ID:secret:2k-scout/prod*
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: 2k-scout
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1  # update to match your region
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: 2k-scout
  annotations:
    # Replace with the IAM role ARN that has SecretsManager read access
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/2k-scout-secrets-role
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: 2k-scout-secrets
  namespace: 2k-scout
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: 2k-scout-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: 2k-scout/prod
