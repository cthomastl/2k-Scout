apiVersion: v1
kind: ConfigMap
metadata:
  name: 2k-scout-ai-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  2k-scout-ai.json: |
    {
      "title": "2K Scout - AI Cost & Quality",
      "uid": "2k-scout-ai",
      "schemaVersion": 39,
      "timezone": "browser",
      "time": { "from": "now-6h", "to": "now" },
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "hide": 0,
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Estimated Spend (last 6h)",
          "type": "stat",
          "datasource": "${datasource}",
          "gridPos": { "h": 5, "w": 8, "x": 0, "y": 0 },
          "targets": [
            { "expr": "increase(ai_estimated_cost_usd_total[6h])", "legendFormat": "USD" }
          ],
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4 } }
        },
        {
          "id": 2,
          "title": "Cache Hit Rate",
          "type": "stat",
          "datasource": "${datasource}",
          "gridPos": { "h": 5, "w": 8, "x": 8, "y": 0 },
          "targets": [
            {
              "expr": "sum(increase(cache_hits_total{job=\"ai-service\"}[1h])) / (sum(increase(cache_hits_total{job=\"ai-service\"}[1h])) + sum(increase(cache_misses_total{job=\"ai-service\"}[1h])))",
              "legendFormat": "hit rate"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1 } }
        },
        {
          "id": 3,
          "title": "Truncated Responses (stop_reason=max_tokens, last 6h)",
          "type": "stat",
          "datasource": "${datasource}",
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 0 },
          "targets": [
            { "expr": "increase(ai_stop_reason_total{reason=\"max_tokens\"}[6h])", "legendFormat": "truncated" }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Token Usage (per 5m, by direction)",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "targets": [
            {
              "expr": "sum(rate(ai_tokens_total[5m])) by (direction)",
              "legendFormat": "{{direction}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "Claude Call Latency (p95)",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(anthropic_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 6,
          "title": "Claude Errors by Type",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 13 },
          "targets": [
            {
              "expr": "sum(rate(ai_errors_total[5m])) by (type)",
              "legendFormat": "{{type}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "color": { "mode": "fixed", "fixedColor": "red" } }
          }
        },
        {
          "id": 7,
          "title": "Estimated Cost Rate ($/hour)",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 13 },
          "targets": [
            {
              "expr": "rate(ai_estimated_cost_usd_total[15m]) * 3600",
              "legendFormat": "$/hr"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 3 } }
        }
      ]
    }
