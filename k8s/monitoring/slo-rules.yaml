apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: 2k-scout-slo
  namespace: monitoring
  labels:
    # Matches the ruleSelectorNilUsesHelmValues=false override in
    # setup-monitoring.sh — without one of these two, the chart's Prometheus
    # only watches PrometheusRules labeled release: <helm-release-name>,
    # same trap this repo already hit once with ServiceMonitor selectors.
    release: kube-prometheus-stack
spec:
  groups:
    # --- Recording rules -----------------------------------------------
    # Precompute each SLI's "bad event ratio" per window once here, instead
    # of repeating the same rate()/sum() query inline in every alert (and
    # in every dashboard panel that wants the same number). This is the
    # standard SRE pattern: recording rules are the SLI, alerting rules are
    # thresholds applied to the SLI.
    - name: 2k-scout-slo-recording-rules
      interval: 30s
      rules:
        # Availability SLI: fraction of requests across all four app
        # services that returned a 5xx, per window.
        - record: slo:availability_errors:ratio_rate5m
          expr: |
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service", status_code=~"5.."}[5m]))
            /
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service"}[5m]))
        - record: slo:availability_errors:ratio_rate30m
          expr: |
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service", status_code=~"5.."}[30m]))
            /
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service"}[30m]))
        - record: slo:availability_errors:ratio_rate1h
          expr: |
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service", status_code=~"5.."}[1h]))
            /
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service"}[1h]))
        - record: slo:availability_errors:ratio_rate2h
          expr: |
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service", status_code=~"5.."}[2h]))
            /
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service"}[2h]))
        - record: slo:availability_errors:ratio_rate6h
          expr: |
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service", status_code=~"5.."}[6h]))
            /
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service"}[6h]))
        - record: slo:availability_errors:ratio_rate1d
          expr: |
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service", status_code=~"5.."}[1d]))
            /
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service"}[1d]))
        - record: slo:availability_errors:ratio_rate3d
          expr: |
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service", status_code=~"5.."}[3d]))
            /
            sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|ai-service|auth-service"}[3d]))

        # Latency SLI (fast endpoints only — gateway/team-service/auth-service.
        # ai-service is excluded: its /api/gameplan route is dominated by
        # Claude generation time and would blow out this budget regardless
        # of whether anything is actually wrong. It gets its own SLI below.
        - record: slo:fast_latency_slow_requests:ratio_rate5m
          expr: |
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job=~"gateway|team-service|auth-service", le="0.5"}[5m]))
              /
              sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|auth-service"}[5m]))
            )
        - record: slo:fast_latency_slow_requests:ratio_rate1h
          expr: |
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job=~"gateway|team-service|auth-service", le="0.5"}[1h]))
              /
              sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|auth-service"}[1h]))
            )
        - record: slo:fast_latency_slow_requests:ratio_rate6h
          expr: |
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job=~"gateway|team-service|auth-service", le="0.5"}[6h]))
              /
              sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|auth-service"}[6h]))
            )
        - record: slo:fast_latency_slow_requests:ratio_rate3d
          expr: |
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job=~"gateway|team-service|auth-service", le="0.5"}[3d]))
              /
              sum(rate(http_request_duration_seconds_count{job=~"gateway|team-service|auth-service"}[3d]))
            )

        # AI game plan latency SLI: fraction of Claude calls (isolated via
        # anthropic_request_duration_seconds, not the whole HTTP request)
        # that took longer than 8s. Uses the bucket boundary already defined
        # for that histogram in ai-service/index.js.
        - record: slo:ai_latency_slow_calls:ratio_rate1h
          expr: |
            1 - (
              sum(rate(anthropic_request_duration_seconds_bucket{le="8"}[1h]))
              /
              sum(rate(anthropic_request_duration_seconds_count[1h]))
            )

    # --- Alerting rules --------------------------------------------------
    # Multi-window, multi-burn-rate alerting (Google SRE Workbook, ch. 5):
    # require BOTH a short window and a long window to be burning budget
    # abnormally fast before paging. The short window makes the alert fire
    # quickly once a real problem starts; the long window stops a brief
    # blip (a single bad deploy for 90 seconds) from paging anyone. Burn
    # rate 1.0 = consuming the 30-day error budget at exactly the
    # sustainable rate (exhausts it precisely at day 30 if sustained).
    - name: 2k-scout-slo-alerts
      rules:
        # Availability SLO: 99.5% success over 30d -> error budget = 0.5% = 0.005
        - alert: SLOAvailabilityBurnRateFast
          expr: |
            slo:availability_errors:ratio_rate5m > (14.4 * 0.005)
            and
            slo:availability_errors:ratio_rate1h > (14.4 * 0.005)
          for: 2m
          labels:
            severity: page
            slo: availability
          annotations:
            summary: "Burning availability error budget 14.4x too fast (page)"
            description: "5xx ratio is {{ $value | humanizePercentage }} over the last hour. At this rate the 30-day error budget is exhausted in ~2 days. Check recent deploys and dependent services (Postgres/Redis/Anthropic) first."

        - alert: SLOAvailabilityBurnRateSlow
          expr: |
            slo:availability_errors:ratio_rate30m > (6 * 0.005)
            and
            slo:availability_errors:ratio_rate6h > (6 * 0.005)
          for: 5m
          labels:
            severity: page
            slo: availability
          annotations:
            summary: "Burning availability error budget 6x too fast (page)"
            description: "5xx ratio is {{ $value | humanizePercentage }} over the last 6 hours. At this rate the 30-day error budget is exhausted in ~5 days."

        - alert: SLOAvailabilityBurnRateTicketFast
          expr: |
            slo:availability_errors:ratio_rate2h > (3 * 0.005)
            and
            slo:availability_errors:ratio_rate1d > (3 * 0.005)
          for: 10m
          labels:
            severity: ticket
            slo: availability
          annotations:
            summary: "Burning availability error budget 3x too fast (ticket)"
            description: "5xx ratio is {{ $value | humanizePercentage }} over the last day. Not urgent enough to page — file a ticket to investigate before it accelerates."

        - alert: SLOAvailabilityBurnRateTicketSlow
          expr: |
            slo:availability_errors:ratio_rate6h > (1 * 0.005)
            and
            slo:availability_errors:ratio_rate3d > (1 * 0.005)
          for: 30m
          labels:
            severity: ticket
            slo: availability
          annotations:
            summary: "Burning availability error budget at the sustainable-exhaustion rate (ticket)"
            description: "5xx ratio is {{ $value | humanizePercentage }} over the last 3 days — sustained, this exhausts the entire 30-day budget right on schedule with nothing left for anything else this month."

        # Latency SLO (fast endpoints): 95% under 500ms over 30d -> error budget = 5% = 0.05
        # Abbreviated to 2 tiers (page + ticket) instead of the full 4 above
        # — lower-stakes SLI, not every SLO needs the full rigor.
        - alert: SLOFastLatencyBurnRateFast
          expr: |
            slo:fast_latency_slow_requests:ratio_rate5m > (14.4 * 0.05)
            and
            slo:fast_latency_slow_requests:ratio_rate1h > (14.4 * 0.05)
          for: 2m
          labels:
            severity: page
            slo: fast_latency
          annotations:
            summary: "Burning fast-endpoint latency budget 14.4x too fast (page)"
            description: "{{ $value | humanizePercentage }} of gateway/team-service/auth-service requests exceeded 500ms over the last hour."

        - alert: SLOFastLatencyBurnRateTicket
          expr: |
            slo:fast_latency_slow_requests:ratio_rate6h > (1 * 0.05)
            and
            slo:fast_latency_slow_requests:ratio_rate3d > (1 * 0.05)
          for: 30m
          labels:
            severity: ticket
            slo: fast_latency
          annotations:
            summary: "Burning fast-endpoint latency budget at the sustainable-exhaustion rate (ticket)"
            description: "{{ $value | humanizePercentage }} of requests exceeded 500ms over the last 3 days."

        # AI game plan latency SLO: 95% of Claude calls under 8s over 30d.
        # Single window, no page tier — low request volume (one user testing)
        # makes a two-window confirmation mostly noise here, and a slow
        # Claude call isn't page-worthy the way a real outage is.
        - alert: SLOAILatencyBudgetBurn
          expr: slo:ai_latency_slow_calls:ratio_rate1h > 0.3
          for: 15m
          labels:
            severity: ticket
            slo: ai_latency
          annotations:
            summary: "Claude calls are running slow"
            description: "{{ $value | humanizePercentage }} of Claude API calls exceeded 8s over the last hour — check Anthropic status and anthropic_request_duration_seconds before assuming it's our bug."
