apiVersion: v1
kind: ConfigMap
metadata:
  name: 2k-scout-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  2k-scout-overview.json: |
    {
      "title": "2K Scout - Service Overview",
      "uid": "2k-scout-overview",
      "schemaVersion": 39,
      "timezone": "browser",
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "hide": 0,
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Services Up",
          "type": "stat",
          "datasource": "${datasource}",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(up{job=~\"gateway|team-service|ai-service|auth-service\"})",
              "legendFormat": "up"
            },
            {
              "expr": "count(up{job=~\"gateway|team-service|ai-service|auth-service\"})",
              "legendFormat": "total"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 4 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Request Rate (req/s by service)",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count[5m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Error Rate (5xx req/s by service)",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count{status_code=~\"5..\"}[5m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "color": { "mode": "fixed", "fixedColor": "red" } }
          }
        },
        {
          "id": 4,
          "title": "P95 Latency (seconds by service)",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job))",
              "legendFormat": "{{job}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        },
        {
          "id": 5,
          "title": "Pod Restarts (2k-scout namespace)",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"2k-scout\"}[15m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ]
    }
