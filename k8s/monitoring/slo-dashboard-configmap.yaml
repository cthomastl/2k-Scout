apiVersion: v1
kind: ConfigMap
metadata:
  name: 2k-scout-slo-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  2k-scout-slo.json: |
    {
      "title": "2K Scout - SLOs & Error Budget",
      "uid": "2k-scout-slo",
      "schemaVersion": 39,
      "timezone": "browser",
      "time": { "from": "now-3d", "to": "now" },
      "refresh": "1m",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "hide": 0,
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Availability SLO (target 99.5%, 3d window)",
          "type": "stat",
          "datasource": "${datasource}",
          "description": "1 - the same error ratio the availability burn-rate alerts use, over the longest recorded window (3d — a real 30d view needs Prometheus retention raised past the chart's 10d default; see setup-monitoring.sh).",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 0 },
          "targets": [
            { "expr": "1 - slo:availability_errors:ratio_rate3d", "legendFormat": "compliance" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0.98,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.99 },
                  { "color": "green", "value": 0.995 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Fast-Endpoint Latency SLO (target 95% < 500ms, 3d window)",
          "type": "stat",
          "datasource": "${datasource}",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 0 },
          "targets": [
            { "expr": "1 - slo:fast_latency_slow_requests:ratio_rate3d", "legendFormat": "compliance" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0.8,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.9 },
                  { "color": "green", "value": 0.95 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "AI Claude Latency SLO (target 95% < 8s, 1h window)",
          "type": "stat",
          "datasource": "${datasource}",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 0 },
          "targets": [
            { "expr": "1 - slo:ai_latency_slow_calls:ratio_rate1h", "legendFormat": "compliance" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0.5,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.85 },
                  { "color": "green", "value": 0.95 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Availability Error Budget Remaining (3d window, as % of the full 0.5% budget)",
          "type": "gauge",
          "datasource": "${datasource}",
          "description": "0% means the 3-day burn rate alone would consume the entire monthly error budget by day 30. Below 0% means it already would have been exhausted before the month ends.",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "targets": [
            { "expr": "1 - (slo:availability_errors:ratio_rate3d / 0.005)", "legendFormat": "budget remaining" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": -1,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.3 },
                  { "color": "green", "value": 0.6 }
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "Availability Burn Rate — short vs. long window",
          "type": "timeseries",
          "datasource": "${datasource}",
          "description": "The multi-window burn-rate alerts fire only when both a short window (5m) and long window (1h) exceed the same threshold at once — this panel is what that logic is looking at. A brief spike in the 5m line alone is noise; both lines elevated together is a real, sustained problem.",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "targets": [
            { "expr": "slo:availability_errors:ratio_rate5m", "legendFormat": "5m window" },
            { "expr": "slo:availability_errors:ratio_rate1h", "legendFormat": "1h window" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit" }
          }
        },
        {
          "id": 6,
          "title": "AI Claude Slow-Call Ratio (1h window)",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "targets": [
            { "expr": "slo:ai_latency_slow_calls:ratio_rate1h", "legendFormat": "> 8s ratio" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit" }
          }
        },
        {
          "id": 7,
          "title": "Fast-Endpoint Slow-Request Ratio — short vs. long window",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "targets": [
            { "expr": "slo:fast_latency_slow_requests:ratio_rate5m", "legendFormat": "5m window" },
            { "expr": "slo:fast_latency_slow_requests:ratio_rate1h", "legendFormat": "1h window" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit" }
          }
        }
      ]
    }
