apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: 2k-scout
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ECR_REGISTRY/2k-scout-gateway:IMAGE_TAG
          ports:
            - containerPort: 8080
          env:
            - name: AI_SERVICE_URL
              value: "http://ai-service:3002"
            - name: TEAM_SERVICE_URL
              value: "http://team-service:3001"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3003"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: 2k-scout
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
