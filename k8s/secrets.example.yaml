# TEMPLATE ONLY — do not commit real secrets.
# Copy this file, fill in real values, and apply it out-of-band
# (e.g. `kubectl apply -f secrets.yaml`) or manage it with a sealed-secrets /
# external-secrets operator. The real Secret should never be checked in.
apiVersion: v1
kind: Secret
metadata:
  name: 2k-scout-secrets
  namespace: 2k-scout
type: Opaque
stringData:
  NBA2K_API_KEY: "replace-me"
  ANTHROPIC_API_KEY: "replace-me"
  JWT_SECRET: "replace-me"
  DEMO_EMAIL: "scout@2kscout.app"
  DEMO_PASSWORD: "scout2k"
  # Used by k8s/postgres.yaml to set the in-cluster Postgres pod's own password.
  # Keep this in sync with whatever password is embedded in DATABASE_URL below —
  # Kubernetes Secrets don't interpolate between keys, so it's on you to match them.
  POSTGRES_PASSWORD: "replace-me"
  # Point this at the in-cluster Postgres pod (default, works out of the box),
  # your own local Postgres, or an RDS endpoint — auth-service and ai-service
  # just read this connection string, they don't care which.
  DATABASE_URL: "postgresql://scout:replace-me@postgres:5432/scout"
  # Point this at the in-cluster Redis pod (default) or an external Redis/ElastiCache.
  REDIS_URL: "redis://redis:6379"
