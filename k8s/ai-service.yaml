apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: 2k-scout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ECR_REGISTRY/2k-scout-ai-service:IMAGE_TAG
          ports:
            - containerPort: 3002
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: 2k-scout-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: 2k-scout
spec:
  type: ClusterIP
  selector:
    app: ai-service
  ports:
    - port: 3002
      targetPort: 3002
