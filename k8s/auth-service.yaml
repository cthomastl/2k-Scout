apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: 2k-scout
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/cthomastl/2k-scout-auth-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: 2k-scout-secrets
                  key: JWT_SECRET
            - name: DEMO_EMAIL
              valueFrom:
                secretKeyRef:
                  name: 2k-scout-secrets
                  key: DEMO_EMAIL
            - name: DEMO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: 2k-scout-secrets
                  key: DEMO_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: 2k-scout
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - port: 3003
      targetPort: 3003
