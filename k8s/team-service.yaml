apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-service
  namespace: 2k-scout
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team-service
  template:
    metadata:
      labels:
        app: team-service
    spec:
      containers:
        - name: team-service
          image: ECR_REGISTRY/2k-scout-team-service:IMAGE_TAG
          ports:
            - containerPort: 3001
          env:
            - name: NBA2K_API_KEY
              valueFrom:
                secretKeyRef:
                  name: 2k-scout-secrets
                  key: NBA2K_API_KEY
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: team-service
  namespace: 2k-scout
spec:
  type: ClusterIP
  selector:
    app: team-service
  ports:
    - port: 3001
      targetPort: 3001
