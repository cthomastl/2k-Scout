server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Same routing job k8s/ingress.yaml does with the nginx ingress controller —
    # /api and /auth go to the gateway container, everything else is the SPA.
    location /api {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /auth {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
