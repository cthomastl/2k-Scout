services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scout
      POSTGRES_DB: scout
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "scout"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  team-service:
    image: ghcr.io/cthomastl/2k-scout-team-service:latest
    restart: unless-stopped
    environment:
      NBA2K_API_KEY: ${NBA2K_API_KEY}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  ai-service:
    image: ghcr.io/cthomastl/2k-scout-ai-service:latest
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://scout:${POSTGRES_PASSWORD}@postgres:5432/scout
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    image: ghcr.io/cthomastl/2k-scout-auth-service:latest
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DEMO_EMAIL: ${DEMO_EMAIL}
      DEMO_PASSWORD: ${DEMO_PASSWORD}
      DATABASE_URL: postgresql://scout:${POSTGRES_PASSWORD}@postgres:5432/scout
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    image: ghcr.io/cthomastl/2k-scout-gateway:latest
    restart: unless-stopped
    environment:
      AI_SERVICE_URL: http://ai-service:3002
      TEAM_SERVICE_URL: http://team-service:3001
      AUTH_SERVICE_URL: http://auth-service:3003
    depends_on:
      - ai-service
      - team-service
      - auth-service

  frontend:
    image: ghcr.io/cthomastl/2k-scout-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx-edge.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway

volumes:
  postgres-data:
